<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Connexion — Mailer</title>
  <meta name="theme-color" content="#0b141b">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%2312232e'/%3E%3Cpath d='M22 34h56a4 4 0 0 1 4 4v28a4 4 0 0 1-4 4H22a4 4 0 0 1-4-4V38a4 4 0 0 1 4-4Z' fill='none' stroke='%231c7c74' stroke-width='5'/%3E%3Cpath d='M20 36l30 22 30-22' fill='none' stroke='%231c7c74' stroke-width='5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="auth.css">
</head>
<body>
  <div class="login-shell">
    <div class="login-card">
      <div class="login-brand">
        <span class="login-mark" aria-hidden="true">
          <svg width="26" height="26" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="2" y="5" width="20" height="14" rx="2.5" stroke="currentColor" stroke-width="1.8"/>
            <path d="M3 6.5 12 13l9-6.5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </span>
        <p class="login-brand-name">Mailer</p>
      </div>

      <form id="login-form" class="login-panel">
        <div>
          <p class="login-title">Connexion</p>
          <p class="login-sub">Entre tes identifiants pour accéder à ton espace.</p>
        </div>

        <label class="field">
          <span>Email</span>
          <input type="email" id="login-email" autocomplete="username" required autofocus>
        </label>
        <label class="field">
          <span>Mot de passe</span>
          <input type="password" id="login-password" autocomplete="current-password" required>
        </label>

        <div id="login-status" class="inline-status"></div>

        <button type="submit" class="btn btn-primary">Se connecter</button>

        <hr class="login-divider">
        <p class="login-switch" style="margin:0;">
          Compte pas encore activé ?
          <button type="button" id="resend-activation">Renvoyer l'email d'activation</button>
        </p>
      </form>

      <p class="login-switch">Pas encore de compte ? <a href="/register.html">Créer un compte</a></p>
      <p class="login-footer">Chaque compte a ses propres identifiants Gmail · session valable 30 jours</p>
    </div>
  </div>

  <script src="login.js"></script>
  <script src="cookie-consent.js"></script>
</body>
</html>
