<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Connexion — Mailer</title>
  <meta name="theme-color" content="#12232e">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%2312232e'/%3E%3Cpath d='M22 34h56a4 4 0 0 1 4 4v28a4 4 0 0 1-4 4H22a4 4 0 0 1-4-4V38a4 4 0 0 1 4-4Z' fill='none' stroke='%231c7c74' stroke-width='5'/%3E%3Cpath d='M20 36l30 22 30-22' fill='none' stroke='%231c7c74' stroke-width='5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E">
  <link rel="stylesheet" href="style.css">
  <style>
    .login-shell {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .login-card { width: 100%; max-width: 380px; }
    .login-brand {
      display: flex;
      align-items: center;
      gap: 12px;
      justify-content: center;
      margin-bottom: 22px;
    }
    .login-title { margin: 0 0 4px 0; font-size: 15px; font-weight: 800; text-align: center; }
    .login-sub { margin: 0 0 22px 0; font-size: 13px; color: var(--muted); text-align: center; }
  </style>
</head>
<body>
  <div class="login-shell">
    <div class="login-card">
      <div class="login-brand">
        <span class="brand-mark" aria-hidden="true">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="2" y="5" width="20" height="14" rx="2.5" stroke="currentColor" stroke-width="1.8"/>
            <path d="M3 6.5 12 13l9-6.5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </span>
        <p class="brand-name" style="margin:0;">Mailer</p>
      </div>

      <form id="setup-form" class="panel" hidden>
        <p class="login-title">Créer le compte administrateur</p>
        <p class="login-sub">Première utilisation — choisis un identifiant et un mot de passe pour protéger l'application.</p>

        <label class="field">
          <span>Identifiant</span>
          <input type="text" id="setup-username" autocomplete="username" required>
        </label>
        <label class="field">
          <span>Mot de passe <em>— 8 caractères minimum</em></span>
          <input type="password" id="setup-password" autocomplete="new-password" required minlength="8">
        </label>
        <label class="field">
          <span>Confirmer le mot de passe</span>
          <input type="password" id="setup-password-confirm" autocomplete="new-password" required minlength="8">
        </label>

        <div id="setup-status" class="inline-status"></div>

        <button type="submit" class="btn btn-primary">Créer le compte</button>
      </form>

      <form id="login-form" class="panel" hidden>
        <p class="login-title">Connexion</p>
        <p class="login-sub">Entre tes identifiants pour accéder à l'application.</p>

        <label class="field">
          <span>Identifiant</span>
          <input type="text" id="login-username" autocomplete="username" required>
        </label>
        <label class="field">
          <span>Mot de passe</span>
          <input type="password" id="login-password" autocomplete="current-password" required>
        </label>

        <div id="login-status" class="inline-status"></div>

        <button type="submit" class="btn btn-primary">Se connecter</button>
      </form>
    </div>
  </div>

  <script src="login.js"></script>
</body>
</html>
